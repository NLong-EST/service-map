<!DOCTYPE html>
<html>
<head>

<title>Agilent ASP Workload Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
#map { height: 600px; margin-top: 10px; }

h3 { 
  font-size: 38px; 
  color: #0A85D2; 
}
.dropdown {
  position: relative;
  display: inline-block;
}

.dropdown-content {
  display: none;
  position: absolute;
  background: white;
  border: 1px solid #ccc;
  padding: 10px;
  max-height: 800px;
  overflow-y: auto;
  z-index: 999;
  min-width: 200px;
  white-space: nowrap;
}

.dropdown.open .dropdown-content {
  display: block;
}
  

.marker-circle {
    color: white;
    border-radius: 20px;        
    padding: 1px 1px;          
    min-width: 35px;
    height: 35px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: normal;
    border: 2px solid white;
    box-sizing: border-box;
}

</style>

</head>

<body>

<h3 style="margin: 0 0 5px 0;">Agilent ASP Workload Map</h3>
<hr style="border: none; height: 2px; background-color: #0A85D2; margin: 7px 0;">


<div class="dropdown" id="dropdown">
  <button onclick="toggleDropdown()">Select ASPs</button>
  <div class="dropdown-content" id="repFilter"></div>
</div>

<button onclick="selectAll()">All</button>
<button onclick="clearAll()">None</button>

<label>Onsite Date Range: Start</label>
<input type="date" id="startDate">

<label>End</label>
<input type="date" id="endDate">
<div style="margin-top:5px; margin-left:15px; font-style:italic;">
    "-O" after the ASPs initials are activites in Offered Status
</div>
  
<div style="margin-top:7px;">
  <b>Total Activities: <span id="totalCount"></span> | Filtered Activities: <span id="count"></span></b>
</div>

<div style="display:flex; gap:15px; margin-top:7px;">
    <b>Legend:</b>

    <span style="display:flex;align-items:center;gap:5px;">
        <span style="width:12px;height:12px;background:blue;border-radius:50%;"></span>
        Scheduled
    </span>

    <span style="display:flex;align-items:center;gap:5px;">
        <span style="width:12px;height:12px;background:orange;border-radius:50%;"></span>
        Offered(Unscheduled)
    </span>
</div>

<div style="font-style:italic; margin-top:5px;margin-left:15px;">
         The date listed for Offered(Unscheduled) activities is just placeholder date in the month due
</div>

<label style="display:flex; align-items:center; gap:5px; margin-top:7px;">
    <span style="font-weight:bold;">Show Districts:</span>
    <input type="checkbox" id="toggleDistricts" checked>
</label>


</div>



</div>


<div id="map"></div>


<script>

const fileUrl = "https://raw.githubusercontent.com/NLong-EST/service-map/main/map%20test.csv?rand=" + new Date().getTime();

const map = L.map('map').setView([39, -98], 4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
map.zoomControl.setPosition('topright');
  
/* ======================
   ✅ DISTRICT COLORS
====================== */
function getDistrictColor(name) {
  return {
    "Mountain Northwest": "#008f87",   // deep teal
    "Southwest": "#e53935",            // red
    "Central Plains": "#f2d18b",       // tan
    "MidWest": "#97FFFF",              // map blue
    "Lonestar": "#7b1fa2",             // purple
    "NorCal": "#d7a9d7",               // lavender
    "New England": "#2e7d32",          // rich green
    "NY": "#f7ea48",       // yellow
    "PADE": "#d77bd7",    // magenta
    "MidAtlantic": "#2A22FF",          // map bluedarker
    "Carolinas": "#f77f87",            // coral
    "Southern": "#26a69a"           // teal-green
  }[name] || null;  // keep null so nothing weird renders if mismatch
}

/* ======================
   ✅ DISTRICT LAYER (SAFE)
====================== */
let districtLayer;
  fetch('districts.geojson')
  .then(res => res.json())
  .then(data => {

    districtLayer = L.geoJSON(data, {
      style: function (feature) {

        const color = getDistrictColor(feature.properties.name);

        return {
          color: '#444',
          weight: 1,
          fillColor: color ? color : "transparent",
          fillOpacity: color ? 0.25 : 0
        };
      },

      onEachFeature: function (feature, layer) {
        if (feature.properties.name) {
          layer.bindPopup("<b>" + feature.properties.name + "</b>");
        }
      }

    }).addTo(map);

    districtLayer.bringToBack();
  })
  .catch(err => console.log("GeoJSON error:", err));

/* ======================
   ✅ ORIGINAL CODE
====================== */

let data = [];
let markers = [];

function toggleDropdown() {
  document.getElementById("dropdown").classList.toggle("open");
}

function selectAll() {
  document.querySelectorAll('#repFilter input').forEach(cb => cb.checked = true);
  drawMarkers();
}

function clearAll() {
  document.querySelectorAll('#repFilter input').forEach(cb => cb.checked = false);
  drawMarkers();
}

async function load() {
  const res = await fetch(fileUrl);
  const text = await res.text();

  Papa.parse(text, {
    header: true,
    skipEmptyLines: true,
    complete: function(results) {

      data = results.data.map(row => ({
        lat: parseFloat(row["Site Lat"]),
        lon: parseFloat(row["Site Lon"]),
        rep: row["Rep Initials"],
        date: new Date(row["Onsite Date"]),
        raw: row
      }));

      document.getElementById("totalCount").innerText = data.length;

      populateReps();
      drawMarkers();
    }
  });
}

function populateReps() {
  const reps = [...new Set(
    data.map(d => d.rep).filter(r => r).sort()
  )];

  const container = document.getElementById("repFilter");
  container.innerHTML = "";

  reps.forEach(r => {
    const label = document.createElement("label");
    label.style.display = "block";

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.value = r;
    checkbox.checked = true;

    checkbox.addEventListener("change", drawMarkers);

    label.appendChild(checkbox);
    label.append(" " + r);

    container.appendChild(label);
  });
}

function drawMarkers() {

  markers.forEach(m => map.removeLayer(m));
  markers = [];

  const checked = Array.from(
    document.querySelectorAll('#repFilter input:checked')
  ).map(cb => cb.value);

  const startVal = document.getElementById("startDate").value;
  const endVal = document.getElementById("endDate").value;

  const startDate = startVal ? new Date(startVal) : null;
  const endDate = endVal ? new Date(endVal) : null;

  const grouped = {};

  data.forEach(d => {

    if (isNaN(d.lat) || isNaN(d.lon)) return;
    if (!checked.includes(d.rep)) return;
    if (startDate && d.date < startDate) return;
    if (endDate && d.date > endDate) return;

    const key = d.lat + "," + d.lon;

    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(d);
  });

  for (const key in grouped) {

    const items = grouped[key];
    const first = items[0];

    let popup = `<b>Total jobs: ${items.length}</b><br><br>`;

    items.forEach(x => {
      popup += `
      <div style="margin-bottom:8px;">
        <b>${x.raw["Title"]}</b><br>
        ${x.raw["Rep Initials"]} : ${x.raw["Onsite Date"]}<br>
        ${x.raw["Customer"]}<br>
        ${x.raw["Equipment Name"]} : ${x.raw["Activity Type"]}
      </div>`;
    });

   
let initials = first.rep;
let color;

if (initials && initials.toLowerCase().includes("unassigned")) {
    initials = "UN";
    color = "white";
} else {
    color = first.rep && first.rep.endsWith("-O") ? "orange" : "blue";
}

const textColor = color === "#f4c542" ? "black" : "white";

const markerIcon = L.divIcon({
    className: '',
    html: `<div class="marker-circle" style="background:${color}; color:${textColor}">${initials}</div>`,
    iconSize: [30, 30],
    iconAnchor: [15, 15]
});


const marker = L.marker([first.lat, first.lon], { icon: markerIcon })
    .addTo(map)
    .bindPopup(popup);


    markers.push(marker);
  }

  let filteredCount = 0;
  for (const key in grouped) {
    filteredCount += grouped[key].length;
  }

  document.getElementById("count").innerText = filteredCount;

  const bounds = markers.map(m => m.getLatLng());
  if (bounds.length) {
    map.fitBounds(bounds, { maxZoom: 6 });
  }
}

document.getElementById("startDate").addEventListener("change", drawMarkers);
document.getElementById("endDate").addEventListener("change", drawMarkers);
document.getElementById("startDate").valueAsDate = new Date();

load();

// ✅ ADD THIS RIGHT HERE
document.getElementById("toggleDistricts").addEventListener("change", function() {
  if (this.checked) {
    map.addLayer(districtLayer);
  } else {
    map.removeLayer(districtLayer);
  }
});
</script>

</body>
</html>
