<!DOCTYPE html>
<html>
<head>

<title>Service Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
  #map { height: 600px; margin-top: 10px; }
</style>

</head>

<body>

<h3>Service Map</h3>

<label>Rep:</label>
<select id="repFilter">
  <option value="">All</option>
</select>

<label>Start:</label>
<input type="date" id="startDate">

<label>End:</label>
<input type="date" id="endDate">

<div id="map"></div>

<script>

const fileUrl = "https://raw.githubusercontent.com/NLong-EST/service-map/main/map%20test.csv?v=2";

const map = L.map('map').setView([39, -98], 4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let data = [];
let markers = [];

async function load() {
  const res = await fetch(fileUrl);
  const text = await res.text();

  const headers = text.split("\n")[0].split(",");
  const rows = text.trim().split(/\r?\n/).slice(1);

  data = rows.map(row => {
    const cols = row.split(",");

    let obj = {};
    headers.forEach((h, i) => {
      obj[h.trim()] = cols[i];
    });

    obj.lat = parseFloat(obj["Site Lat"]);
    obj.lon = parseFloat(obj["Site Lon"]);
    obj.date = new Date(obj["Onsite Date"]);
    obj.rep = obj["Rep Initials"];

    return obj;
  });

  populateReps();
  drawMarkers();
}

function populateReps() {
  const reps = [...new Set(data.map(d => d.rep))];
  const dropdown = document.getElementById("repFilter");

  reps.forEach(r => {
    if (!r) return;
    const opt = document.createElement("option");
    opt.value = r;
    opt.text = r;
    dropdown.appendChild(opt);
  });
}

function drawMarkers() {

  markers.forEach(m => map.removeLayer(m));
  markers = [];

  const repVal = document.getElementById("repFilter").value;
  const startVal = document.getElementById("startDate").value;
  const endVal = document.getElementById("endDate").value;

  const startDate = startVal ? new Date(startVal) : null;
  const endDate = endVal ? new Date(endVal) : null;

  data.forEach(d => {

    if (isNaN(d.lat) || isNaN(d.lon)) return;

    if (repVal && d.rep !== repVal) return;

    if (startDate && d.date < startDate) return;
    if (endDate && d.date > endDate) return;

    let popup = "";
    for (const key in d) {
      if (key === "lat" || key === "lon") continue;
      popup += `<b>${key}:</b> ${d[key]}<br>`;
    }

    const marker = L.marker([d.lat, d.lon])
      .addTo(map)
      .bindPopup(popup);

    markers.push(marker);
  });
}

document.getElementById("repFilter").addEventListener("change", drawMarkers);
document.getElementById("startDate").addEventListener("change", drawMarkers);
document.getElementById("endDate").addEventListener("change", drawMarkers);

load();

</script>

</body>
</html>
