<!DOCTYPE html>
<html>
<head>

<title>Agilent ASP Workload Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
  #map {
    height: 600px;
    margin-top: 10px;
  }
</style>

</head>

<body>

<h3>Agilent ASP Workload Map</h3>

<div id="map"></div>

<script>

// ===== CSV DATA =====
const fileUrl = "https://raw.githubusercontent.com/NLong-EST/service-map/main/map%20test.csv?rand=" + new Date().getTime();

// ===== MAP INIT =====
const map = L.map('map').setView([39, -98], 4);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ===== DISTRICT COLORS =====
function getDistrictColor(name) {
  return {
    "Mountain Northwest": "#00a99d",
    "Lonestar": "#a67cd9",
       
  }[name] || "#ccc";
}

// ===== LOAD DISTRICTS =====
fetch('districts.geojson')
  .then(res => res.json())
  .then(data => {

    const districtLayer = L.geoJSON(data, {
      style: function (feature) {
        return {
          color: '#444',
          weight: 1,
          fillColor: getDistrictColor(feature.properties.name),
          fillOpacity: 0.2
        };
      },
      onEachFeature: function (feature, layer) {
        layer.bindPopup("<b>" + feature.properties.name + "</b>");
      }
    }).addTo(map);

    districtLayer.bringToBack();
  });

// ===== MARKERS =====
let markers = [];

async function loadData() {
  const res = await fetch(fileUrl);
  const text = await res.text();

  Papa.parse(text, {
    header: true,
    skipEmptyLines: true,
    complete: function(results) {

      results.data.forEach(row => {

        const lat = parseFloat(row.Latitude);
        const lng = parseFloat(row.Longitude);

        if (!isNaN(lat) && !isNaN(lng)) {

          const marker = L.circleMarker([lat, lng], {
            radius: 5,
            fillColor: row.Status === "Scheduled" ? "green" : "orange",
            color: "#000",
            weight: 1,
            fillOpacity: 0.8
          }).addTo(map);

          marker.bindPopup(
            "<b>Rep:</b> " + row.Rep + "<br>" +
            "<b>Status:</b> " + row.Status
          );

          markers.push(marker);
        }
      });

    }
  });
}

loadData();

</script>

</body>
</html>
