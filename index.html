<!DOCTYPE html>
<html>
<head>

<title>Service Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
  #map { height: 600px; margin-top: 10px; }
</style>

</head>

<body>

<h3>Agilent ASP Workload Map</h3>

<label>Rep:</label>
<select id="repFilter">
  <option value="">All</option>
</select>

<label>Start:</label>
<input type="date" id="startDate">

<label>End:</label>
<input type="date" id="endDate">
<div style="margin-top:5px;">
  <b>Total: <span id="count"></span></b>
</div>


  <div style="display:flex;align-items:center;gap:15px;margin-top:5px;">
    <b>Legend:</b>

    <span style="display:inline-flex;align-items:center;gap:5px;">
      <span style="width:12px;height:12px;background:blue;"></span>
      Scheduled
    </span>

    <span style="display:inline-flex;align-items:center;gap:5px;">
      <span style="width:12px;height:12px;background:orange;"></span>
      Unscheduled
    </span>

  </div>

</div>

  <div>



<div id="map"></div>

<script>

const fileUrl = "https://raw.githubusercontent.com/NLong-EST/service-map/main/map%20test.csv?rand=" + new Date().getTime();

const map = L.map('map').setView([39, -98], 4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let data = [];
let markers = [];

async function load() {
  const res = await fetch(fileUrl);
  const text = await res.text();

  Papa.parse(text, {
    header: true,
    skipEmptyLines: true,
    complete: function(results) {

      data = results.data.map(row => ({
        lat: parseFloat(row["Site Lat"]),
        lon: parseFloat(row["Site Lon"]),
        rep: row["Rep Initials"],
        date: new Date(row["OnsiteDate"]),
        raw: row
      }));

      populateReps();
      drawMarkers();
    }
  });
}

function populateReps() {
  const reps = [...new Set(
    data
      .map(d => d.rep)
      .filter(r => r && /^[A-Z]{2,4}$/.test(r))
  )];

  const dropdown = document.getElementById("repFilter");
  dropdown.innerHTML = '<option value="">All</option>';

  reps.forEach(r => {
    const opt = document.createElement("option");
    opt.value = r;
    opt.text = r;
    dropdown.appendChild(opt);
  });
}

function drawMarkers() {

  markers.forEach(m => map.removeLayer(m));
  markers = [];

  const repVal = document.getElementById("repFilter").value;
  const startVal = document.getElementById("startDate").value;
  const endVal = document.getElementById("endDate").value;

  const startDate = startVal ? new Date(startVal) : null;
  const endDate = endVal ? new Date(endVal) : null;
  
const grouped = {};
  data.forEach(d => {

    if (isNaN(d.lat) || isNaN(d.lon)) return;

    if (repVal && d.rep !== repVal) return;
    if (startDate && d.date < startDate) return;
    if (endDate && d.date > endDate) return;

   let popup = `<b>Multiple jobs at this site:</b><br>`;
popup += d.raw["Title"] + "<br>";
  const key = d.lat + "," + d.lon;
    if (!grouped[key]) {
    grouped[key] = [];
  }

  grouped[key].push(d);

});
markers.forEach(m => map.removeLayer(m));
markers = [];

for (const key in grouped) {

  const items = grouped[key];
  const first = items[0];

  let popup = `<b>Total jobs: ${items.length}</b><br><br>`;

  
items.forEach(x => {
  popup += `
  <div style="margin-bottom:8px;">
    <b>${x.raw["Title"]}</b><br>
    ${x.raw["Rep Initials"]} : ${x.raw["Onsite Date"]}<br>
    ${x.raw["Customer"]}<br>
    ${x.raw["Equipment Name"]} : ${x.raw["Activity Type"]}
  </div>
  `;
});

const color = first.rep && first.rep.endsWith("-T") ? "orange" : "blue";

const marker = L.circleMarker([first.lat, first.lon], {
  radius: 8,
  fillColor: color,
  color: color,
  weight: 1,
  opacity: 1,
  fillOpacity: 0.8
})
  .addTo(map)
  .bindPopup(popup);

  

  markers.push(marker);
}

document.getElementById("count").innerText = data.length;
 
}

document.getElementById("repFilter").addEventListener("change", drawMarkers);
document.getElementById("startDate").addEventListener("change", drawMarkers);
document.getElementById("endDate").addEventListener("change", drawMarkers);

load();

</script>

</body>
</html>
